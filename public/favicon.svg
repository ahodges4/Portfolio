<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: matches the site's dark mode --bg, so the mark reads
       clearly on any browser tab color, light or dark -->
  <rect width="64" height="64" rx="14" fill="#16171d"/>

  <!-- Three connected nodes: an abstract nod to the network/neural-net
       motif that runs through several projects, kept simple enough to
       read clearly at 16px -->
  <g stroke="#aa3bff" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="16" x2="18" y2="42"/>
    <line x1="32" y1="16" x2="46" y2="42"/>
    <line x1="18" y1="42" x2="46" y2="42"/>
  </g>

  <circle cx="32" cy="16" r="6" fill="#c084fc"/>
  <circle cx="18" cy="42" r="6" fill="#aa3bff"/>
  <circle cx="46" cy="42" r="6" fill="#aa3bff"/>
</svg>
